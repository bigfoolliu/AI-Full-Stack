x-common: &common-net
  networks:
    - kb-network

services:
  frontend:
    build: frontend/
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    <<: *common-net

  backend:
    build: backend/
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    depends_on:
      qdrant:
        condition: service_started
    volumes:
      - backend-uploads:/app/uploads
      - backend-data:/app
    <<: *common-net

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    <<: *common-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kbuser
      POSTGRES_PASSWORD: kbpass
      POSTGRES_DB: knowledge_base
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - postgres
    <<: *common-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    <<: *common-net

volumes:
  qdrant-data:
  backend-uploads:
  backend-data:
  postgres-data:
  redis-data:

networks:
  kb-network:
    driver: bridge
