x-common: &common-net
  networks:
    - kb-network

services:
  frontend:
    build: frontend/
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    <<: *common-net

  backend:
    build: backend/
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: sqlite:////app/data/knowledge_base.db
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    <<: *common-net

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    <<: *common-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kbuser
      POSTGRES_PASSWORD: kbpass
      POSTGRES_DB: knowledge_base
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - postgres
    <<: *common-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    <<: *common-net

volumes:
  qdrant-data:
  backend-uploads:
  backend-data:
  postgres-data:
  redis-data:

networks:
  kb-network:
    driver: bridge
